version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-macro_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-macro_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-macro_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-macro_user} -d ${POSTGRES_DB:-macro_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrator:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://macro_user:macro_password@postgres:5432/macro_tracker}
    command: ["python", "-m", "app.scripts.migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://macro_user:macro_password@postgres:5432/macro_tracker}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-8000}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://macro_user:macro_password@postgres:5432/macro_tracker}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      INGESTION_SCHEDULE_INTERVAL_SECONDS: ${INGESTION_SCHEDULE_INTERVAL_SECONDS:-900}
      INGESTION_STARTUP_DELAY_SECONDS: ${INGESTION_STARTUP_DELAY_SECONDS:-10}
      INGESTION_PULL_LIMIT: ${INGESTION_PULL_LIMIT:-10}
      INGESTION_SCHEDULE_SOURCES: ${INGESTION_SCHEDULE_SOURCES:-fed_press,fed_speeches,ecb_press,bls_calendar}
    command: ["python", "-m", "app.scripts.run_source_scheduler"]
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  pipeline-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://macro_user:macro_password@postgres:5432/macro_tracker}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      OPENAI_DEFAULT_MODEL: ${OPENAI_DEFAULT_MODEL:-openai/gpt-4o-mini}
      OPENAI_COMPLEX_MODEL: ${OPENAI_COMPLEX_MODEL:-openai/gpt-5-mini}
      PIPELINE_ENABLED: ${PIPELINE_ENABLED:-true}
    command: ["python", "-m", "app.scripts.run_pipeline_worker"]
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-macro-tracker-dev-secret}
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
